services:
  app:
    image: ghcr.io/atticus-ezis/amlit-speaks:latest
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - shared-network
    restart: unless-stopped

networks:
  shared-network:
    external: true
